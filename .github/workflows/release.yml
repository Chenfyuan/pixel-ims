name: Release Build
on:
  push:
    tags: ['v*']
  workflow_dispatch:
jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Decode signing keystore
        if: ${{ env.SIGN_KEY_STORE_BASE64 != '' }}
        run: echo "$SIGN_KEY_STORE_BASE64" | base64 -d > /tmp/release.keystore
        env:
          SIGN_KEY_STORE_BASE64: ${{ secrets.SIGN_KEY_STORE_BASE64 }}
      - name: Build release APK
        run: ./gradlew :app:assembleRelease
        env:
          SIGN_KEY_STORE_FILE: ${{ secrets.SIGN_KEY_STORE_BASE64 != '' && '/tmp/release.keystore' || '' }}
          SIGN_KEY_STORE_PASSWORD: ${{ secrets.SIGN_KEY_STORE_PASSWORD }}
          SIGN_KEY_ALIAS: ${{ secrets.SIGN_KEY_ALIAS }}
          SIGN_KEY_PASSWORD: ${{ secrets.SIGN_KEY_PASSWORD }}
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
